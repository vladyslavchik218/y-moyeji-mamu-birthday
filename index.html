<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження, Мамо!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --text-color: #2d3436;
            --bg-color: #fff5f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease;
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .section {
            padding: 80px 20px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 30px;
        }

        /* Галерея-заглушка */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-10px);
        }

        .photo-placeholder {
            width: 100%;
            height: 250px;
            background: #eee;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: #999;
        }

        /* Інтерактивна зона */
        .compliment-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 117, 140, 0.2);
        }

        #compliment-text {
            font-size: 1.4rem;
            min-height: 60px;
            margin-bottom: 25px;
            font-style: italic;
            color: #d63031;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        button:hover {
            background: #e84393;
            box-shadow: 0 5px 15px rgba(232, 67, 147, 0.4);
        }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Анімації */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .heart {color: white;
            font-size: 2rem;
            animation: heartBeat 1.5s infinite;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>З Днем Народження, Мамо!</h1>
        <p class="subtitle">Найкращій людині у світі присвячується</p>
        <div class="heart">❤</div>
    </header>


    <section class="section">
        <div class="compliment-box">
            <h2>Генератор любові</h2>
            <p id="compliment-text">Натисни кнопку, щоб прочитати щось приємне...</p>
            <button onclick="generateCompliment()">Отримати комплімент</button>
        </div>
    </section>

    <section class="section">
        <h2>Від сина-програміста</h2>
        <p style="max-width: 600px; margin: 0 auto; font-size: 1.1rem; color: #636e72;">
            Мам, за моїх 14 років життя з тобою, хочу сказати гарне дякую тобі, я вдячний світу, що ти у мене є!
        </p>
    </section>
    <script>
        const compliments = [
            "Дякую, що дала зрозуміти шо айфон не коштує 200 гривень",
            "Твоя усмішка робить мій день кращим.",
            "Дякую за твою нескінченну підтримку та віру в мене.",
            "Ти готуєш найсмачнішу їжу у всесвіті!",
            "Дякую, що одобрила пітбайк",
            "Ти — мій герой без плащу.",
            "Світ стає кращим поруч із тобою.",
            "Стільки порваних листків чистовика, за ради дисципліни",
            "Дякую, що навчила вірити у себе!"
        ];

        function generateCompliment() {
            const textElement = document.getElementById('compliment-text');
            const randomIndex = Math.floor(Math.random() * compliments.length);
            
            // Додаємо легкий ефект появи
            textElement.style.opacity = 0;
            
            setTimeout(() => {
                textElement.innerText = compliments[randomIndex];
                textElement.style.opacity = 1;
                textElement.style.transition = '0.5s';
            }, 200);
        }
    </script>
</body>
</html>
